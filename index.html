<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Daily Routine</title>\n    <style>\n        body {\n            background-color: rgb(255, 255, 255);\n            border: 1px solid var(--accent-color);\n            font-family: Arial, sans-serif;\n        }\n        .container {\n            width: 80%;\n            margin: auto;\n        }\n        h1 {\n            color: var(--primary-color);\n        }\n        .section {\n            margin: 20px 0;\n            padding: 10px;\n            border: 1px solid var(--dark-color);\n        }\n        .task {\n            margin: 5px 0;\n            background-color: var(--secondary-color);\n            padding: 8px;\n            color: white;\n        }\n        .drop-area {\n            border: 2px dashed var(--accent-color);\n            padding: 20px;\n            text-align: center;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Daily Routine</h1>\n        <div class="section">\n            <h2>Morning</h2>\n            <div class="task">Wake up</div>\n            <div class="task">Make a bed</div>\n            <div class="task">Wash my face</div>\n            <div class="drop-area">Drag and drop tasks here!</div>\n        </div>\n        <div class="section">\n            <h2>Afternoon</h2>\n            <div class="task">Take breakfast</div>\n            <div class="drop-area">Drag and drop tasks here!</div>\n        </div>\n        <div class="section">\n            <h2>Evening</h2>\n            <div class="task">Go to school</div>\n            <div class="drop-area">Drag and drop tasks here!</div>\n        </div>\n    </div>\n</body>\n</html>\n
