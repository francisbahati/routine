<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📅 Daily Routine Planner</h1>
        
        <div class="routine-grid">
            <!-- Morning Section -->
            <div class="section" id="morning-section">
                <h2>🌅 Morning</h2>
                <div class="tasks-container">
                    <div class="task" id="task-1" draggable="true">☀️ Wake up</div>
                    <div class="task" id="task-2" draggable="true">🛏️ Make a bed</div>
                    <div class="task" id="task-3" draggable="true">🚿 Wash my face</div>
                </div>
                <div class="drop-area"><span class="empty-state">Drop tasks here</span></div>
            </div>

            <!-- Afternoon Section -->
            <div class="section" id="afternoon-section">
                <h2>☀️ Afternoon</h2>
                <div class="tasks-container">
                    <div class="task" id="task-4" draggable="true">🍽️ Take breakfast</div>
                </div>
                <div class="drop-area"><span class="empty-state">Drop tasks here</span></div>
            </div>

            <!-- Evening Section -->
            <div class="section" id="evening-section">
                <h2>🌙 Evening</h2>
                <div class="tasks-container">
                    <div class="task" id="task-5" draggable="true">🎒 Go to school</div>
                </div>
                <div class="drop-area"><span class="empty-state">Drop tasks here</span></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
